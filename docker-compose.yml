services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fugue
      POSTGRES_PASSWORD: fugue
      POSTGRES_DB: fugue
    ports:
      - "5433:5432"
    volumes:
      - fugue_pgdata:/var/lib/postgresql/data

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "--jetstream"
    volumes:
      - fugue_natsdata:/data

volumes:
  fugue_pgdata:
  fugue_natsdata:
